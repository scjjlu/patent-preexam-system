name: Build Windows .exe

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml lxml pillow streamlit pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller build/preexam_ui.spec --noconfirm

      - name: Verify build
        run: |
          Get-ChildItem dist/ -Recurse

      - name: Package as zip
        run: |
          Compress-Archive -Path "dist/preexam-review/*" -DestinationPath "preexam-windows.zip" -CompressionLevel Optimal
          $s = (Get-Item "preexam-windows.zip").Length
          Write-Host "Zip: $([math]::Round($s/1MB, 1)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: preexam-windows
          path: preexam-windows.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
