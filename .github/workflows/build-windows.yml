# ─────────────────────────────────────────────────────────────────
# GitHub Actions Workflow: Build Windows standalone executable
#
# Trigger: push to main/release tag, or manual (workflow_dispatch)
# Output: Uploads the .exe as a downloadable artifact
#
# How to use:
#   1. Push this repo to GitHub
#   2. Go to Actions → "Build Windows .exe" → Run workflow
#   3. Download the built .zip from the run's Artifacts section
# ─────────────────────────────────────────────────────────────────

name: Build Windows .exe

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:  # allow manual trigger

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml lxml pillow streamlit pyinstaller

      - name: 🔨 Build with PyInstaller
        run: |
          pyinstaller build/preexam_ui.spec --noconfirm

      - name: 📁 Verify build output
        run: |
          Get-ChildItem -Path dist/ -Recurse -Name

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 专利预审案卷辅助审查系统-Windows
          path: dist/专利预审案卷辅助审查系统/
          if-no-files-found: error
          compression-level: 6
