name: Build Windows .exe

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml lxml pillow streamlit pyinstaller

      - name: 🔨 Build with PyInstaller
        run: |
          pyinstaller build/preexam_ui.spec --noconfirm
        env:
          PYTHONIOENCODING: utf-8

      - name: 📁 Verify build output
        run: |
          Get-ChildItem -Path dist/ -Recurse -Name

      - name: 📦 Package as zip
        run: |
          # Create a flat zip with a clean English name
          $source = "dist/专利预审案卷辅助审查系统"
          if (Test-Path $source) {
            Compress-Archive -Path "$source/*" -DestinationPath "preexam-windows.zip" -CompressionLevel Optimal
            $zipSize = (Get-Item "preexam-windows.zip").Length
            Write-Host "Zip size: $($zipSize / 1MB) MB"
          } else {
            Write-Host "Directory not found: $source"
            Get-ChildItem dist/
          }

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: preexam-windows
          path: preexam-windows.zip
          if-no-files-found: error
          compression-level: 0  # already compressed
          retention-days: 30
